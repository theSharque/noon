services:
  mysql:
    image: mysql:5.7
    command: >
      --character-set-server=utf8
      --collation-server=utf8_general_ci
      --sql_mode=NO_ENGINE_SUBSTITUTION
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 30

  flyway:
    image: flyway/flyway:10
    command: -connectRetries=60 migrate
    environment:
      FLYWAY_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE}
      FLYWAY_USER: ${MYSQL_USER}
      FLYWAY_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - ./db/migration:/flyway/sql
      - ./db/flyway.conf:/flyway/conf/flyway.conf
    depends_on:
      mysql:
        condition: service_healthy

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    environment:
      NOON_DB_HOST: ${NOON_DB_HOST}
      NOON_DB_USER: ${MYSQL_USER}
      NOON_DB_PASSWORD: ${MYSQL_PASSWORD}
      NOON_DB_NAME: ${MYSQL_DATABASE}
    volumes:
      - ./www_new:/var/www/noon
    depends_on:
      flyway:
        condition: service_completed_successfully

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "${NGINX_PORT}:80"
    volumes:
      - ./www_new:/var/www/noon:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php

  cron:
    build:
      context: .
      dockerfile: docker/cron/Dockerfile
    environment:
      TZ: ${TZ}
      NOON_DB_HOST: ${NOON_DB_HOST}
      NOON_DB_USER: ${MYSQL_USER}
      NOON_DB_PASSWORD: ${MYSQL_PASSWORD}
      NOON_DB_NAME: ${MYSQL_DATABASE}
    volumes:
      - ./www_new:/var/www/noon
    depends_on:
      flyway:
        condition: service_completed_successfully
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
